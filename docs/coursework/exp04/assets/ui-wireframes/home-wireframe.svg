<svg xmlns="http://www.w3.org/2000/svg" width="520" height="900" viewBox="0 0 520 900">
  <rect width="100%" height="100%" fill="#f1f5f9"/>
  <style>
    .title { font: 700 26px 'Microsoft YaHei', sans-serif; fill: #0f172a; }
    .subtitle { font: 500 14px 'Microsoft YaHei', sans-serif; fill: #475569; }
    .label { font: 600 16px 'Microsoft YaHei', sans-serif; fill: #0f172a; }
    .small { font: 500 12px 'Microsoft YaHei', sans-serif; fill: #475569; }
    .tiny { font: 500 11px 'Microsoft YaHei', sans-serif; fill: #64748b; }
    .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 18; ry: 18; }
    .wire { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 12; ry: 12; }
    .accent { fill: #dbeafe; stroke: #60a5fa; stroke-width: 2; rx: 14; ry: 14; }
    .accent2 { fill: #dcfce7; stroke: #34d399; stroke-width: 2; rx: 14; ry: 14; }
    .accent3 { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 14; ry: 14; }
    .accent4 { fill: #fee2e2; stroke: #f87171; stroke-width: 2; rx: 14; ry: 14; }
    .line { stroke: #64748b; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="40" y="50" class="title">首页 线框图</text>
  <text x="40" y="78" class="subtitle">低保真结构示意，聚焦布局、信息层级与交互区</text>
  <rect x="80" y="110" width="360" height="740" class="wire" fill="#fff"/>
  <rect x="100" y="130" width="320" height="42" class="wire"/>
  <text x="210" y="156" class="small">顶部状态/标题栏</text>
  <rect x="110" y="200" width="300" height="170" class="wire"/>
  <text x="128" y="228" class="label">积分环形区</text>
  <text x="128" y="256" class="small">积分/完成度/趋势信息</text>
  <rect x="110" y="390" width="300" height="140" class="wire"/>
  <text x="128" y="418" class="label">AI 建议卡片</text>
  <text x="128" y="446" class="small">马上记录 / 稍后提醒</text>
  <rect x="110" y="550" width="145" height="110" class="wire"/>
  <text x="128" y="578" class="label">快捷卡片 A</text>
  <text x="128" y="606" class="small">旧物回收</text>
  <rect x="265" y="550" width="145" height="110" class="wire"/>
  <text x="283" y="578" class="label">快捷卡片 B</text>
  <text x="283" y="606" class="small">校园森林</text>
  <rect x="110" y="680" width="300" height="110" class="wire"/>
  <text x="128" y="708" class="label">近期成就列表</text>
  <text x="128" y="736" class="small">展示最近两条成果</text>
  <rect x="110" y="805" width="300" height="28" class="wire"/>
  <text x="128" y="833" class="label">底部导航栏</text>
  <text x="128" y="861" class="small">首页/日志/广场/商城/报告/我的</text>
</svg>
